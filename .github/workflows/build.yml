name: build

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            runtime: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            runtime: linux-arm64
          - os: macos-14
            goos: darwin
            goarch: arm64
            runtime: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cache runtime
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst
          key: runtime-${{ matrix.runtime }}-${{ hashFiles('scripts/build-runtime-*.sh') }}-v5
      - name: Cache Docker image
        if: matrix.goos == 'linux' && steps.cache-runtime.outputs.cache-hit != 'true'
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ hashFiles('docker/builder.Dockerfile') }}
      - name: Build Docker image
        if: matrix.goos == 'linux' && steps.cache-runtime.outputs.cache-hit != 'true' && steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          docker build -t magick-go-builder -f docker/builder.Dockerfile .
          mkdir -p /tmp
          docker save magick-go-builder -o /tmp/docker-image.tar
      - name: Load Docker image
        if: matrix.goos == 'linux' && steps.cache-runtime.outputs.cache-hit != 'true' && steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-image.tar
      - name: Build ImageMagick runtime
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            bash scripts/build-runtime-darwin.sh "${{ matrix.runtime }}" "internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst"
          else
            docker run --rm \
              -v "$(pwd)":/workspace \
              -w /workspace \
              magick-go-builder \
              bash scripts/build-runtime-linux.sh "${{ matrix.runtime }}" "internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst"
            sudo chmod -R a+rw internal/runtimebundle/assets/
          fi
      - name: Test
        run: |
          # Ensure() extracts the runtime and returns the lib path.
          # We must set LD_LIBRARY_PATH/DYLD_LIBRARY_PATH BEFORE go test
          # because CGO_ENABLED=0 dlopen cannot pick up setenv changes.
          libpath=$(go run ./internal/runtimebundle/printlibpath)
          echo "Runtime lib path: ${libpath}"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export DYLD_LIBRARY_PATH="${libpath}"
          else
            export LD_LIBRARY_PATH="${libpath}"
          fi
          go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            runtime: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            runtime: linux-arm64
          - os: macos-14
            goos: darwin
            goarch: arm64
            runtime: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cache runtime
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst
          key: runtime-${{ matrix.runtime }}-${{ hashFiles('scripts/build-runtime-*.sh') }}-v5
      - name: Cache Docker image
        if: matrix.goos == 'linux' && steps.cache-runtime.outputs.cache-hit != 'true'
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ hashFiles('docker/builder.Dockerfile') }}
      - name: Build Docker image
        if: matrix.goos == 'linux' && steps.cache-runtime.outputs.cache-hit != 'true' && steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          docker build -t magick-go-builder -f docker/builder.Dockerfile .
          mkdir -p /tmp
          docker save magick-go-builder -o /tmp/docker-image.tar
      - name: Load Docker image
        if: matrix.goos == 'linux' && steps.cache-runtime.outputs.cache-hit != 'true' && steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-image.tar
      - name: Build ImageMagick runtime
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            bash scripts/build-runtime-darwin.sh "${{ matrix.runtime }}" "internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst"
          else
            docker run --rm \
              -v "$(pwd)":/workspace \
              -w /workspace \
              magick-go-builder \
              bash scripts/build-runtime-linux.sh "${{ matrix.runtime }}" "internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst"
            sudo chmod -R a+rw internal/runtimebundle/assets/
          fi
      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o "dist/magickgo-${{ matrix.runtime }}" ./cmd/magickgo
      - name: Doctor
        run: |
          "./dist/magickgo-${{ matrix.runtime }}" doctor --verbose
          "./dist/magickgo-${{ matrix.runtime }}" doctor --json > doctor.json
          formats="JPEG PNG WEBP TIFF HEIC SVG PDF"
          if [ "${{ matrix.goos }}" = "linux" ]; then
            formats="${formats} JXL"
          fi
          for format in ${formats}; do
            grep -q "\"${format}\": true" doctor.json
          done
      - uses: actions/upload-artifact@v4
        with:
          name: magickgo-${{ matrix.runtime }}
          path: dist/magickgo-${{ matrix.runtime }}
