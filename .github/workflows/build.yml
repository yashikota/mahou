name: build

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            runtime: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            runtime: linux-arm64
          - os: macos-14
            goos: darwin
            goarch: arm64
            runtime: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Cache runtime
        id: cache-runtime
        uses: actions/cache@v4
        with:
          path: internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst
          key: runtime-${{ matrix.runtime }}-${{ hashFiles('scripts/build-runtime-*.sh') }}-v2
      - name: Build ImageMagick runtime
        if: steps.cache-runtime.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            bash scripts/build-runtime-darwin.sh "${{ matrix.runtime }}" "internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst"
          else
            bash scripts/build-runtime-linux.sh "${{ matrix.runtime }}" "internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst"
          fi
      - name: Test
        run: |
          # Compute the same path that Ensure() will use, so LD_LIBRARY_PATH
          # points to the correct lib/ directory at process start time.
          asset="internal/runtimebundle/assets/runtime-${{ matrix.runtime }}.tar.zst"
          hash=$(sha256sum "${asset}" | cut -c1-64)
          short="${hash:0:16}"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            runtime_dir="${HOME}/Library/Caches/magickgo/runtime/${{ matrix.runtime }}-${short}"
          else
            runtime_dir="${HOME}/.cache/magickgo/runtime/${{ matrix.runtime }}-${short}"
          fi
          # Pre-extract so Ensure() finds it ready
          if [ ! -f "${runtime_dir}/.magickgo-runtime-ready" ]; then
            rm -rf "${runtime_dir}"
            mkdir -p "${runtime_dir}"
            zstd -d "${asset}" --stdout | tar -C "${runtime_dir}" -xf -
            echo "${hash}" > "${runtime_dir}/.magickgo-runtime-ready"
          fi
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export DYLD_LIBRARY_PATH="${runtime_dir}/lib"
          else
            export LD_LIBRARY_PATH="${runtime_dir}/lib"
          fi
          go test ./...
      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o "dist/magickgo-${{ matrix.runtime }}" ./cmd/magickgo
      - name: Doctor
        run: |
          "./dist/magickgo-${{ matrix.runtime }}" doctor --verbose
          "./dist/magickgo-${{ matrix.runtime }}" doctor --json > doctor.json
          formats="JPEG PNG WEBP TIFF HEIC SVG PDF JXL"
          for format in ${formats}; do
            grep -q "\"${format}\": true" doctor.json
          done
      - uses: actions/upload-artifact@v4
        with:
          name: magickgo-${{ matrix.runtime }}
          path: dist/magickgo-${{ matrix.runtime }}
